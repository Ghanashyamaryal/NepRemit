project_id = "nepremit"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false

[auth.email.template.confirmation]
subject = "Welcome to NepRemit — Confirm your email"
content_path = "./supabase/templates/welcome.html"

[auth.email.template.recovery]
subject = "Reset your NepRemit password"
content_path = "./supabase/templates/reset-password.html"

[auth.email.template.magic_link]
subject = "Your NepRemit sign-in link"
content_path = "./supabase/templates/magic-link.html"
